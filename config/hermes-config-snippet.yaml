# Merge this into ~/.hermes/profiles/higgsfield/config.yaml
# This loads the higgsfield-fufu skill directly from the repo
# and binds it to the shared group chat.

skills:
  external_dirs:
    - /home/mallika/HiggsfieldAgent/skills   # replace 'mallika' with your WSL username

terminal:
  cwd: /home/mallika/HiggsfieldAgent         # replace 'mallika' with your WSL username

telegram:
  reactions: true                # 👀 processing  ✅ done  ❌ error

platforms:
  telegram:
    extra:
      group_topics:
      - chat_id: -5151614924
        topics:
        - name: FUFU Generator
          skill: higgsfield-fufu
          # thread_id: omit for a plain group chat (no forum topics)
          # Add thread_id: <id> if the group has Forum Topics enabled
